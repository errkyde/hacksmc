services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-hacksmc}
      POSTGRES_USER: ${DB_USER:-hacksmc}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hacksmc} -d ${DB_NAME:-hacksmc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/errkyde/hacksmc-backend:latest
    environment:
      DB_HOST: postgres
      PORT_POSTGRES: 5432
      DB_NAME: ${DB_NAME:-hacksmc}
      DB_USER: ${DB_USER:-hacksmc}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      PFSENSE_BASE_URL: ${PFSENSE_BASE_URL:-https://pfsense.local}
      PFSENSE_API_KEY: ${PFSENSE_API_KEY}
      PFSENSE_TRUST_ALL_CERTS: ${PFSENSE_TRUST_ALL_CERTS:-false}
      PORT_BACKEND: ${PORT_BACKEND:-3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:$${PORT_BACKEND:-3000}/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/errkyde/hacksmc-frontend:latest
    environment:
      NGINX_PORT: 80
      PORT_BACKEND: ${PORT_BACKEND:-3000}
    ports:
      - "${BIND_IP:-0.0.0.0}:${NGINX_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
