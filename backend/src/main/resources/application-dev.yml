# ── Development profile ─────────────────────────────────────────────────────
# Activate with: -Dspring.profiles.active=dev  (or SPRING_PROFILES_ACTIVE=dev)
# start.sh sets this automatically in dev mode.
#
# Key optimisations vs production profile:
#  - Lazy bean initialisation → beans created on first request, not on startup
#  - Background Flyway migration → schema migration runs in background thread
#  - Hot-reload via spring-boot-devtools (if on classpath)

spring:
  main:
    lazy-initialization: true        # Cuts startup time roughly in half
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
  flyway:
    enabled: true
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none                 # Flyway owns schema; skip Hibernate validation in dev
  # Devtools: faster restart without full JVM restart (optional dep)
  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s
    livereload:
      enabled: false

# Reduce SpringDoc startup cost in dev
springdoc:
  pre-loading-enabled: false
  cache:
    disabled: true
