spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${PORT_POSTGRES:5432}/${DB_NAME:hacksmc}
    username: ${DB_USER:hacksmc}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        temp:
          use_jdbc_metadata_defaults: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT_BACKEND:3000}

hacksmc:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  pfsense:
    base-url: ${PFSENSE_BASE_URL:https://pfsense.local}
    api-key: ${PFSENSE_API_KEY}
    trust-all-certs: ${PFSENSE_TRUST_ALL_CERTS:false}

management:
  server:
    port: ${PORT_BACKEND:3000}
  endpoints:
    web:
      exposure:
        include: health
      base-path: /internal
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui
  pre-loading-enabled: false
  default-produces-media-type: application/json
