spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${PORT_POSTGRES:5432}/${DB_NAME:hacksmc}
    username: ${DB_USER:hacksmc}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT_BACKEND:3000}

hacksmc:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  pfsense:
    base-url: ${PFSENSE_BASE_URL:https://pfsense.local}
    api-key: ${PFSENSE_API_KEY}
    trust-all-certs: ${PFSENSE_TRUST_ALL_CERTS:false}

management:
  server:
    port: 9000
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui
