services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - path: .env.docker
        required: false
    environment:
      POSTGRES_DB: ${DB_NAME:-hacksmc}
      POSTGRES_USER: ${DB_USER:-hacksmc}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hacksmc} -d ${DB_NAME:-hacksmc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/errkyde/hacksmc-backend:latest
    container_name: hacksmc-backend
    env_file:
      - path: .env.docker
        required: false
    environment:
      DB_HOST: postgres
      PORT_POSTGRES: 5432
      DB_NAME: ${DB_NAME:-hacksmc}
      DB_USER: ${DB_USER:-hacksmc}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      PFSENSE_BASE_URL: ${PFSENSE_BASE_URL:-https://pfsense.local}
      PFSENSE_API_KEY: ${PFSENSE_API_KEY}
      PFSENSE_TRUST_ALL_CERTS: ${PFSENSE_TRUST_ALL_CERTS:-false}
      PORT_BACKEND: ${PORT_BACKEND:-3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/errkyde/hacksmc-frontend:latest
    container_name: hacksmc-frontend
    env_file:
      - path: .env.docker
        required: false
    environment:
      NGINX_PORT: 80
      PORT_BACKEND: ${PORT_BACKEND:-3000}
    ports:
      - "${BIND_IP:-0.0.0.0}:${NGINX_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: 60
      WATCHTOWER_CLEANUP: "true"
    command: hacksmc-backend hacksmc-frontend

volumes:
  postgres_data:
